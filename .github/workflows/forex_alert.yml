name: Daily Forex Calendar Alert

on:
  schedule:
    # Runs at 02:00 UTC (7:00 AM PKT) every day
    - cron: '0 2 * * *'
  workflow_dispatch: 

jobs:
  send-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install curl-cffi tradingview-ta

      - name: Execute Extraction Script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py
