name: Daily Forex Calendar Alert

on:
  schedule:
    # London (07:30 UTC) and New York (12:30 UTC) - Monday through Friday
    - cron: '30 7,12 * * 1-5'
    
    # Tokyo (23:30 UTC) - Sunday through Thursday (for Mon-Fri Tokyo mornings)
    - cron: '30 23 * * 0-4'
    
  workflow_dispatch:

jobs:
  send-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install curl-cffi tradingview-ta
        
      - name: Execute Extraction Script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py
